services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      REPO_URL: "https://gitlab.com/openpowerlifting/opl-data.git"
      REPO_PATH: "/data/opl-data"
      DATA_PATH: "/data/opl-data/meet-data"
      REFRESH_INTERVAL: "1h"
    volumes:
      - opl-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s  # data load takes several minutes

volumes:
  opl-data:
